spring.application.name=consumer

server.port=8090

spring.kafka.consumer.bootstrap-servers=localhost:9092

# serialization to send objects to kafka
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.deserializer.value.delegate.class=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.value.default.type=com.demo.consumer.RiderLocation

spring.kafka.consumer.properties.spring.json.type.mapping=com.demo.producer.RiderLocation:com.demo.consumer.RiderLocation
spring.kafka.consumer.properties.spring.json.value.default.type=com.demo.consumer.RiderLocation

spring.cloud.stream.function.definition=processRiderLocation
spring.cloud.stream.bindings.processRiderLocation-in-0.destination=my-topic-new
spring.cloud.stream.bindings.processRiderLocation-in-0.group=my-new-group-rider
spring.cloud.kafka.binder.brokers=localhost:9092

